<!-- Hero Banner for Homepage -->
{{ if .IsHome }}
<img class="hero-banner" src="/images/social-preview.png" alt="Venus Reviews - Independent pleasure product reviews" />
{{ end }}

<!-- Social Preview Image for Open Graph -->
{{ if .IsHome }}
<meta property="og:image" content="{{ "images/social-preview.png" | absURL }}" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
{{ end }}
