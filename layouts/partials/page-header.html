<header class="page-header">
  <div class="container">
    <h1>{{ .Title }}</h1>
    <div class="page-header-meta">
      {{ if .Params.category }}
      <span>Category: {{ .Params.category }}</span>
      {{ end }}
      {{ if .Params.rating }}
      <span>Rating: {{ .Params.rating }}/5</span>
      {{ end }}
    </div>
  </div>
</header>
